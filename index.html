<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>वाणी AI Pro — TCC AI Voice Desk | The Consulting Crew</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #7C3AED;
    --purple-dark: #5B21B6;
    --purple-light: #A78BFA;
    --purple-glow: #7C3AED33;
    --gold: #F59E0B;
    --gold-light: #FCD34D;
    --ink: #0F0A1E;
    --ink2: #1E1535;
    --surface: #F8F5FF;
    --border: #E5D9FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--ink); scroll-behavior: smooth; }
  .hindi { font-family: 'Noto Sans Devanagari', sans-serif; }
  .display { font-family: 'Playfair Display', serif; }

  /* Nav */
  .nav-glass {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }

  /* Hero gradient */
  .hero-gradient {
    background: linear-gradient(135deg, #0F0A1E 0%, #1E1535 30%, #3B1A72 60%, #7C3AED 100%);
    position: relative; overflow: hidden;
  }
  .hero-gradient::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(124,58,237,0.4) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(245,158,11,0.15) 0%, transparent 50%);
    pointer-events: none;
  }
  .hero-grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(124,58,237,0.08) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(124,58,237,0.08) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .hero-orb {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.6), transparent 70%);
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }

  /* Cards */
  .card-hover {
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .card-hover:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 60px rgba(124,58,237,0.18);
  }

  /* Pricing */
  .pricing-popular {
    background: linear-gradient(145deg, var(--purple), var(--purple-dark));
    color: white;
    transform: scale(1.04);
    box-shadow: 0 24px 64px rgba(124,58,237,0.4);
  }

  /* Sidebar */
  .admin-sidebar {
    background: linear-gradient(180deg, #0F0A1E 0%, #1E1235 100%);
    width: 240px; min-height: 100vh;
    position: fixed; left: 0; top: 64px; z-index: 10;
  }
  .biz-sidebar {
    background: white;
    border-right: 1px solid var(--border);
    width: 220px; min-height: 100vh;
    position: fixed; left: 0; top: 64px; z-index: 10;
  }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px; border-radius: 8px; cursor: pointer;
    transition: background 0.2s; font-size: 14px;
  }
  .sidebar-item:hover { background: rgba(124,58,237,0.15); }
  .sidebar-item.active { background: rgba(124,58,237,0.25); color: var(--purple-light); }

  /* KPI Cards */
  .kpi-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 20px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .kpi-card:hover { border-color: var(--purple-light); transform: translateY(-2px); }

  /* Bar chart */
  .bar { transition: height 0.6s cubic-bezier(.34,1.56,.64,1); }

  /* Plan Badges */
  .badge-free { background: #E5E7EB; color: #374151; }
  .badge-basic { background: #DBEAFE; color: #1D4ED8; }
  .badge-pro { background: #EDE9FE; color: #6D28D9; }
  .badge-enterprise { background: linear-gradient(90deg,#FCD34D,#F59E0B); color: #78350F; }

  /* Lead badges */
  .lead-hot { background: #FEE2E2; color: #DC2626; }
  .lead-warm { background: #FEF3C7; color: #D97706; }
  .lead-cold { background: #DBEAFE; color: #2563EB; }

  /* Chat widget */
  .chat-bubble-bot {
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    color: white; border-radius: 16px 16px 16px 4px;
    padding: 10px 14px; max-width: 80%; font-size: 14px;
  }
  .chat-bubble-user {
    background: #F3F4F6; color: #111827;
    border-radius: 16px 16px 4px 16px;
    padding: 10px 14px; max-width: 80%; font-size: 14px;
    align-self: flex-end;
  }
  .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: white; opacity: 0.7; animation: blink 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{transform:scale(1);opacity:0.7} 40%{transform:scale(1.3);opacity:1} }

  /* Quick replies */
  .quick-btn {
    border: 1.5px solid var(--purple);
    color: var(--purple); background: white;
    border-radius: 20px; padding: 6px 14px;
    font-size: 12px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .quick-btn:hover { background: var(--purple); color: white; }

  /* Floating widget button */
  .float-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 8px 32px rgba(124,58,237,0.5);
    transition: transform 0.2s;
  }
  .float-btn:hover { transform: scale(1.1); }

  /* Widget panel */
  .widget-panel {
    position: fixed; bottom: 90px; right: 24px; z-index: 200;
    width: 340px; background: white;
    border-radius: 20px; box-shadow: 0 24px 80px rgba(0,0,0,0.2);
    overflow: hidden; animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .widget-header {
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    padding: 16px 20px; color: white;
    display: flex; align-items: center; gap: 12px;
  }
  .widget-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .online-dot { width:8px;height:8px;border-radius:50%;background:#22C55E;border:2px solid white; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Animations */
  @keyframes fadeInUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
  .fade-in-up { animation: fadeInUp 0.5s ease forwards; }

  /* Feature icon box */
  .feature-icon { width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px; }

  /* Table rows */
  .tbl-row { border-bottom:1px solid var(--border); transition: background 0.15s; }
  .tbl-row:hover { background: var(--surface); }

  /* Responsive */
  @media (max-width:768px) {
    .admin-sidebar, .biz-sidebar { display:none; }
    .dashboard-main { margin-left: 0 !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── ICONS ───────────────────────────────────────────────────────────────────
const Icon = ({ name, size=20, className="" }) => {
  const icons = {
    bot: "🤖", chart: "📊", users: "👥", rupee: "₹", msg: "💬", star: "⭐",
    check: "✓", arrow: "→", menu: "☰", close: "✕", send: "➤", phone: "📞",
    loc: "📍", building: "🏢", hotel: "🏨", clinic: "🏥", steel: "💼",
    home: "🏠", leads: "🎯", spark: "✨", shield: "🛡️", zap: "⚡", brain: "🧠",
    globe: "🌐", clock: "🕐", trend: "📈", gear: "⚙️", bell: "🔔", fire: "🔥",
    real: "🏘️", doc: "📄",
  };
  return <span className={className} style={{fontSize:size}}>{icons[name]||"•"}</span>;
};

// ─── NAV ─────────────────────────────────────────────────────────────────────
const Nav = ({ page, setPage }) => {
  const [mobileOpen, setMobileOpen] = useState(false);
  const navLinks = [
    { hash: "/", label: "Home" },
    { hash: "/admin", label: "Admin" },
    { hash: "/business", label: "Business" },
    { hash: "/widget", label: "Chat Widget" },
  ];
  return (
    <nav className="nav-glass">
      <div className="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
        <div className="flex items-center gap-3 cursor-pointer" onClick={()=>setPage("/")}>
          <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#7C3AED,#5B21B6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>वा</div>
          <span className="display font-bold text-lg" style={{color:"#7C3AED"}}>वाणी AI <span style={{color:"#F59E0B"}}>Pro</span></span>
        </div>
        <div className="hidden md:flex items-center gap-6">
          {navLinks.map(l=>(
            <button key={l.hash}
              onClick={()=>setPage(l.hash)}
              className="text-sm font-medium transition-colors"
              style={{color: page===l.hash ? "#7C3AED" : "#6B7280", borderBottom: page===l.hash?"2px solid #7C3AED":"2px solid transparent", paddingBottom:2}}
            >{l.label}</button>
          ))}
          <button onClick={()=>setPage("/business")} style={{background:"linear-gradient(135deg,#7C3AED,#5B21B6)",color:"white",borderRadius:8,padding:"8px 18px",fontSize:13,fontWeight:600,boxShadow:"0 4px 16px rgba(124,58,237,0.35)"}}>
            Free में शुरू करें →
          </button>
        </div>
        <button className="md:hidden" onClick={()=>setMobileOpen(!mobileOpen)}><Icon name="menu" size={22}/></button>
      </div>
      {mobileOpen && (
        <div style={{background:"white",borderTop:"1px solid #E5D9FF",padding:"12px 16px"}}>
          {navLinks.map(l=>(
            <button key={l.hash} onClick={()=>{setPage(l.hash);setMobileOpen(false);}} className="block w-full text-left py-2 text-sm font-medium" style={{color: page===l.hash?"#7C3AED":"#374151"}}>{l.label}</button>
          ))}
        </div>
      )}
    </nav>
  );
};

// ─── LANDING PAGE ─────────────────────────────────────────────────────────────
const Landing = ({ setPage }) => {
  const features = [
    { icon:"brain", title:"Multilingual AI", desc:"Hindi, English, Hinglish — जैसे customer बोले वैसे जवाब", color:"#7C3AED" },
    { icon:"zap", title:"Instant Lead Capture", desc:"हर conversation से lead automatically capture होती है", color:"#F59E0B" },
    { icon:"chart", title:"Smart Analytics", desc:"Real-time dashboard जो business growth दिखाए", color:"#06B6D4" },
    { icon:"shield", title:"WhatsApp Ready", desc:"Website + WhatsApp दोनों पर एक ही AI agent", color:"#22C55E" },
    { icon:"clock", title:"24/7 Active", desc:"जब आप सोते हो, Vaani काम करती है", color:"#EF4444" },
    { icon:"gear", title:"Easy Setup", desc:"5 मिनट में setup — कोई coding नहीं चाहिए", color:"#8B5CF6" },
  ];
  const pricing = [
    { name:"Free", price:0, features:["1 AI Agent","500 messages/mo","Basic Analytics","Email Support"], badge:"" },
    { name:"Basic", price:999, features:["3 AI Agents","5,000 messages/mo","Lead Management","WhatsApp Integration","Priority Support"], badge:"" },
    { name:"Pro", price:2499, features:["10 AI Agents","25,000 messages/mo","Advanced Analytics","CRM Integration","Booking System","Dedicated Manager"], badge:"Most Popular" },
    { name:"Enterprise", price:4999, features:["Unlimited Agents","Unlimited messages","Custom AI Training","API Access","White Label","24/7 Phone Support"], badge:"" },
  ];
  const testimonials = [
    { name:"Ramesh Agarwal", biz:"TCC GST Services, Jaipur", text:"Vaani se hamare leads 3x ho gayi. Din mein 50-60 inquiries handle ho jaati hain bina kisi ke.", stars:5 },
    { name:"Priya Sharma", biz:"Sharma Realty, Vaishali Nagar", text:"Clients ko midnight mein bhi property details mil jaati hai. Conversions 40% badh gayi!", stars:5 },
    { name:"Dr. Sunil Gupta", biz:"Gupta Clinic, Malviya Nagar", text:"Appointment booking automatic ho gayi. Staff ko ab sirf treatment pe focus karna hai.", stars:5 },
  ];
  return (
    <div>
      {/* HERO */}
      <section className="hero-gradient" style={{minHeight:"90vh",display:"flex",alignItems:"center",position:"relative"}}>
        <div className="hero-grid"/>
        <div className="hero-orb" style={{width:400,height:400,top:-100,right:-100,opacity:0.3}}/>
        <div className="hero-orb" style={{width:200,height:200,bottom:50,left:50,opacity:0.2,animationDelay:"2s"}}/>
        <div className="max-w-7xl mx-auto px-4 py-24 relative z-10" style={{width:"100%"}}>
          <div className="text-center fade-in-up">
            <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.4)",borderRadius:24,padding:"6px 18px",marginBottom:24}}>
              <span style={{fontSize:12,color:"#FCD34D",fontWeight:600,letterSpacing:"0.05em"}}>✦ JAIPUR KA #1 BUSINESS AI PLATFORM</span>
            </div>
            <h1 className="display" style={{fontSize:"clamp(2.2rem,6vw,4.5rem)",fontWeight:900,color:"white",lineHeight:1.15,marginBottom:16}}>
              Jaipur ke Har Business ka
              <br/><span style={{background:"linear-gradient(90deg,#F59E0B,#FCD34D)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>AI Sahayak</span>
            </h1>
            <p className="hindi" style={{fontSize:"clamp(1rem,2.5vw,1.25rem)",color:"rgba(255,255,255,0.7)",maxWidth:600,margin:"0 auto 32px",lineHeight:1.7}}>
              अपने business में AI-powered chat assistant लगाएं। <br/>Leads capture करें, bookings लें, 24/7 customer support दें।
            </p>
            <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
              <button onClick={()=>setPage("/business")} style={{background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#1C0A00",borderRadius:12,padding:"14px 32px",fontWeight:700,fontSize:16,boxShadow:"0 8px 32px rgba(245,158,11,0.4)",cursor:"pointer"}}>
                मुफ़्त में शुरू करें ✦
              </button>
              <button onClick={()=>setPage("/widget")} style={{background:"rgba(255,255,255,0.1)",color:"white",border:"1px solid rgba(255,255,255,0.25)",borderRadius:12,padding:"14px 32px",fontWeight:600,fontSize:16,cursor:"pointer",backdropFilter:"blur(8px)"}}>
                Demo देखें →
              </button>
            </div>
            <div style={{marginTop:48,display:"flex",gap:32,justifyContent:"center",flexWrap:"wrap"}}>
              {[["200+","Businesses"],["50L+","Messages Sent"],["4.9★","Rating"],["24/7","Uptime"]].map(([n,l])=>(
                <div key={l} style={{textAlign:"center"}}>
                  <div className="display" style={{fontSize:28,fontWeight:900,color:"#F59E0B"}}>{n}</div>
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      {/* FEATURES */}
      <section style={{padding:"80px 16px",background:"white"}}>
        <div className="max-w-6xl mx-auto">
          <div style={{textAlign:"center",marginBottom:56}}>
            <div style={{fontSize:13,color:"#7C3AED",fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>WHY VAANI AI PRO</div>
            <h2 className="display" style={{fontSize:"clamp(1.8rem,4vw,2.8rem)",fontWeight:800,color:"#0F0A1E"}}>Jo दूसरे नहीं दे सकते, <span style={{color:"#7C3AED"}}>हम देते हैं</span></h2>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:24}}>
            {features.map((f,i)=>(
              <div key={i} className="card-hover" style={{background:"#FAFAFE",border:"1px solid #EDE9FE",borderRadius:16,padding:28}}>
                <div className="feature-icon" style={{background:`${f.color}18`,marginBottom:16}}>
                  <Icon name={f.icon} size={24}/>
                </div>
                <h3 style={{fontWeight:700,marginBottom:8,color:"#1E1535"}}>{f.title}</h3>
                <p className="hindi" style={{color:"#6B7280",fontSize:14,lineHeight:1.6}}>{f.desc}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* PRICING */}
      <section style={{padding:"80px 16px",background:"linear-gradient(180deg,#F8F5FF 0%,#EDE9FE 100%)"}}>
        <div className="max-w-6xl mx-auto">
          <div style={{textAlign:"center",marginBottom:56}}>
            <div style={{fontSize:13,color:"#F59E0B",fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>TRANSPARENT PRICING</div>
            <h2 className="display" style={{fontSize:"clamp(1.8rem,4vw,2.8rem)",fontWeight:800,color:"#0F0A1E"}}>Plans जो आपके <span style={{color:"#7C3AED"}}>Budget में हों</span></h2>
            <p style={{color:"#6B7280",marginTop:8}}>कोई hidden charges नहीं। जब चाहो upgrade या cancel करो।</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:20,alignItems:"center"}}>
            {pricing.map((p,i)=>(
              <div key={i} className={`card-hover ${p.badge?"pricing-popular":""}`} style={{borderRadius:20,padding:"28px 24px",background:p.badge?"":"white",border:p.badge?"none":"1px solid #EDE9FE",position:"relative"}}>
                {p.badge && <div style={{position:"absolute",top:-12,left:"50%",transform:"translateX(-50%)",background:"#F59E0B",color:"#1C0A00",borderRadius:20,padding:"4px 16px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{p.badge}</div>}
                <div style={{fontSize:13,fontWeight:700,marginBottom:4,color:p.badge?"rgba(255,255,255,0.8)":"#6B7280"}}>{p.name}</div>
                <div style={{display:"flex",alignItems:"baseline",gap:2,marginBottom:20}}>
                  <span style={{fontSize:28,fontWeight:900,color:p.badge?"white":"#0F0A1E"}}>₹{p.price.toLocaleString('en-IN')}</span>
                  <span style={{fontSize:13,color:p.badge?"rgba(255,255,255,0.6)":"#9CA3AF"}}>/माह</span>
                </div>
                {p.features.map((f,j)=>(
                  <div key={j} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <span style={{color:p.badge?"#FCD34D":"#7C3AED",fontSize:14,fontWeight:700}}>✓</span>
                    <span style={{fontSize:13,color:p.badge?"rgba(255,255,255,0.85)":"#374151"}}>{f}</span>
                  </div>
                ))}
                <button onClick={()=>setPage("/business")} style={{width:"100%",marginTop:20,padding:"10px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",background:p.badge?"rgba(255,255,255,0.2)":"linear-gradient(135deg,#7C3AED,#5B21B6)",color:"white",border:p.badge?"1px solid rgba(255,255,255,0.3)":"none",transition:"opacity 0.2s"}}>
                  {p.price===0?"मुफ़्त शुरू करें":"शुरू करें →"}
                </button>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* TESTIMONIALS */}
      <section style={{padding:"80px 16px",background:"white"}}>
        <div className="max-w-5xl mx-auto">
          <div style={{textAlign:"center",marginBottom:48}}>
            <div style={{fontSize:13,color:"#7C3AED",fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>REAL BUSINESSES, REAL RESULTS</div>
            <h2 className="display" style={{fontSize:"clamp(1.6rem,3.5vw,2.4rem)",fontWeight:800}}>Jaipur ke Businesses की <span style={{color:"#F59E0B"}}>Success Stories</span></h2>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:24}}>
            {testimonials.map((t,i)=>(
              <div key={i} className="card-hover" style={{background:"#FAFAFE",border:"1px solid #EDE9FE",borderRadius:16,padding:28}}>
                <div style={{marginBottom:12}}>{"⭐".repeat(t.stars)}</div>
                <p className="hindi" style={{color:"#374151",lineHeight:1.7,marginBottom:16,fontSize:14}}>"{t.text}"</p>
                <div>
                  <div style={{fontWeight:700,color:"#0F0A1E",fontSize:14}}>{t.name}</div>
                  <div style={{fontSize:12,color:"#7C3AED"}}>{t.biz}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* CTA */}
      <section style={{padding:"72px 16px",background:"linear-gradient(135deg,#0F0A1E,#3B1A72)"}}>

              <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#7C3AED,#5B21B6)",display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700,fontSize:14,flexShrink:0}}>
                {c.name[0]}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,color:"#0F0A1E",fontSize:13}}>{c.name}</div>
                <div className="hindi" style={{fontSize:12,color:"#6B7280",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.preview}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:11,color:"#9CA3AF"}}>{c.time}</div>
                {c.unread>0 && <div style={{background:"#7C3AED",color:"white",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,marginTop:4,marginLeft:"auto"}}>{c.unread}</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ─── CHAT WIDGET PAGE ─────────────────────────────────────────────────────────
const ChatWidgetPage = () => {
  const [widgetOpen, setWidgetOpen] = useState(true);
  const [messages, setMessages] = useState([
    { from:"bot", text:"Namaste! 🙏 Main Vaani hoon, The Consulting Crew ka AI sahayak. Main aapki kaise madad kar sakti hoon?", time:"10:24 AM" },
  ]);
  const [typing, setTyping] = useState(false);
  const [input, setInput] = useState("");
  const chatRef = useRef(null);

  const quickReplies = ["Services देखें 📊","Consult करें 🛒","Location 📍","Call करें 📞"];

  const botResponses = {
    "Services देखें 📊": "TCC ki compliance services:\n• GST Filing: ₹2,499/year se\n• ITR Filing: ₹999 se\n• TDS Returns: ₹1,499/quarter\n• Company Registration: ₹5,999\n\nKaunsi service chahiye aapko?",
    "Consult करें 🛒": "Free consultation book karne ke liye yeh details dijiye:\n• Business type\n• Service chahiye (GST/ITR/TDS/Registration)\n• Aapka naam & phone\n\nHum 2 hours mein call back karenge! 🚛",
    "Location 📍": "📍 The Consulting Crew\nG-02, C-71, Swastik Heights, Gandhi Path West, Vaishali Nagar, Jaipur - 302021\n\nSomwar - Shanivaar: 10 AM - 7 PM\nGoogle Maps pe 'The Consulting Crew Jaipur' search karein.",
    "Call करें 📞": "📞 Direct call karein:\n+91-9251022710 (Team TCC)\n\nYa aap apna number dijiye, hum aapko call back karenge within 15 minutes! 😊",
  };

  const sendMessage = (text) => {
    if (!text.trim()) return;
    const newMsgs = [...messages, { from:"user", text, time:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) }];
    setMessages(newMsgs);
    setInput("");
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      const reply = botResponses[text] || "Haan ji, main samajh gayi! Iske baare mein ek second mein batati hoon. Koi aur sawaal ho toh zaroor poochhen. 😊";
      setMessages(prev => [...prev, { from:"bot", text:reply, time:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) }]);
    }, 1500);
  };

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, typing]);

  return (
    <div style={{minHeight:"calc(100vh - 64px)",background:"linear-gradient(135deg,#F8F5FF,#EDE9FE)",padding:"32px 16px"}}>
      <div style={{maxWidth:800,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:13,color:"#7C3AED",fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>LIVE DEMO</div>
          <h1 className="display" style={{fontSize:"clamp(1.8rem,4vw,2.5rem)",fontWeight:900,color:"#0F0A1E",marginBottom:12}}>
            वाणी Chat Widget
          </h1>
          <p className="hindi" style={{color:"#6B7280",fontSize:15}}>The Consulting Crew ka embedded AI assistant — बिल्कुल real जैसा</p>
        </div>

        {/* Website mockup */}
        <div style={{background:"white",borderRadius:20,boxShadow:"0 24px 80px rgba(0,0,0,0.12)",overflow:"hidden",border:"1px solid #EDE9FE"}}>
          {/* Browser bar */}
          <div style={{background:"#F3F4F6",padding:"10px 16px",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid #E5E7EB"}}>
            <div style={{display:"flex",gap:5}}>
              {["#EF4444","#F59E0B","#22C55E"].map(c=><div key={c} style={{width:10,height:10,borderRadius:"50%",background:c}}/>)}
            </div>
            <div style={{flex:1,background:"white",borderRadius:6,padding:"4px 12px",fontSize:11,color:"#9CA3AF",border:"1px solid #E5E7EB"}}>
              🔒 www.consultingcrew.in
            </div>
          </div>

          {/* Website content simulation */}
          <div style={{padding:"32px 40px",minHeight:400,position:"relative",background:"linear-gradient(180deg,#fff 0%,#FAFAFE 100%)"}}>
            <div style={{marginBottom:16}}>
              <div style={{width:120,height:8,background:"#7C3AED",borderRadius:4,marginBottom:8}}/>
              <div style={{width:220,height:5,background:"#E5E7EB",borderRadius:4,marginBottom:4}}/>
              <div style={{width:180,height:5,background:"#E5E7EB",borderRadius:4}}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
              {["GST Filing","ITR Filing","MSME Registration"].map(item=>(
                <div key={item} style={{background:"#F8F5FF",border:"1px solid #EDE9FE",borderRadius:10,padding:"12px 14px"}}>
                  <div style={{width:40,height:40,borderRadius:8,background:"linear-gradient(135deg,#EDE9FE,#DDD6FE)",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>💼</div>
                  <div style={{fontWeight:700,fontSize:12,color:"#0F0A1E",marginBottom:2}}>{item}</div>
                  <div style={{fontSize:11,color:"#9CA3AF"}}>Expert services</div>
                </div>
              ))}
            </div>
            <div style={{background:"linear-gradient(135deg,#0F0A1E,#3B1A72)",borderRadius:12,padding:16,color:"white",marginBottom:16}}>
              <div style={{fontWeight:700,marginBottom:4,fontSize:14}}>🏆 Jaipur ka Trusted Compliance Partner</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}>1,100+ Clients | CA/CS/CMA Certified | Pan-India Network</div>
            </div>
            <div style={{color:"#6B7280",fontSize:11,textAlign:"center",marginTop:8}}>↑ यह The Consulting Crew की website का simulation है — Vaani widget नीचे right corner में है ↓</div>

            {/* Widget */}
            {widgetOpen && (
              <div className="widget-panel">
                {/* Widget Header */}
                <div className="widget-header">
                  <div className="widget-avatar" style={{position:"relative"}}>
                    <span style={{fontSize:20}}>🤖</span>
                    <div className="online-dot" style={{position:"absolute",bottom:1,right:1}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>Vaani — The Consulting Crew</div>
                    <div style={{fontSize:11,opacity:0.7,display:"flex",alignItems:"center",gap:4}}>

                  <button onClick={()=>setWidgetOpen(false)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"white",width:28,height:28,borderRadius:"50%",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>✕</button>

                {/* Chat body */}
                <div ref={chatRef} style={{height:260,overflowY:"auto",padding:"14px 14px 8px",display:"flex",flexDirection:"column",gap:10,background:"#F8F5FF"}}>
                  {messages.map((m,i)=>(
                    <div key={i} style={{display:"flex",flexDirection:"column",alignItems:m.from==="user"?"flex-end":"flex-start",gap:3}}>

                      </div>
                      <span style={{fontSize:9,color:"#9CA3AF",padding:"0 4px"}}>{m.time}</span>
                    </div>
                  ))}
                  {typing && (
                    <div style={{display:"flex",alignItems:"flex-start",gap:4}}>
                      <div className="chat-bubble-bot" style={{padding:"10px 14px"}}>
                        <div style={{display:"flex",gap:5,alignItems:"center"}}>
                          <div className="typing-dot"/>
                          <div className="typing-dot"/>
                          <div className="typing-dot"/>
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {/* Quick replies */}
                <div style={{padding:"8px 12px",display:"flex",gap:6,flexWrap:"wrap",borderTop:"1px solid #F3F4F6",background:"white"}}>
                  {quickReplies.map(q=>(
                    <button key={q} className="quick-btn" onClick={()=>sendMessage(q)}>{q}</button>
                  ))}
                </div>

                {/* Input */}
                <div style={{padding:"8px 12px 12px",background:"white",display:"flex",gap:8}}>
                  <input
                    value={input}
                    onChange={e=>setInput(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&sendMessage(input)}
                    placeholder="कुछ भी पूछें..."
                    className="hindi"
                    style={{flex:1,border:"1.5px solid #EDE9FE",borderRadius:10,padding:"8px 12px",fontSize:13,outline:"none",fontFamily:"inherit"}}
                  />
                  <button onClick={()=>sendMessage(input)} style={{background:"linear-gradient(135deg,#7C3AED,#5B21B6)",color:"white",border:"none",borderRadius:10,width:38,height:38,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Icon name="send" size={14}/>
                  </button>
                </div>
              </div>
            )}

            {/* Float button */}
            <div className="float-btn" onClick={()=>setWidgetOpen(!widgetOpen)}>
              {widgetOpen ? <span style={{color:"white",fontSize:18}}>✕</span> : <span style={{fontSize:22}}>💬</span>}
            </div>
          </div>
        </div>

        {/* Instructions */}
        <div style={{marginTop:28,background:"white",borderRadius:16,padding:24,border:"1px solid #EDE9FE"}}>
          <h3 style={{fontWeight:700,color:"#0F0A1E",marginBottom:12,fontSize:15}}>🧪 Widget demo कैसे use करें</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16}}>
            {[
              "Quick reply buttons click करें",
              "Hindi/English में type करें",
              "Enter press करके send करें",
              "Bottom right button से close/open करें"
            ].map((tip,i)=>(
              <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:"#EDE9FE",color:"#7C3AED",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
                <span style={{fontSize:13,color:"#374151"}}>{tip}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
const App = () => {
  const [page, setPage] = useState("/");

  const navigateTo = (hash) => {
    window.location.hash = hash;
    setPage(hash);
    window.scrollTo(0,0);
  };

  useEffect(() => {
    const handleHash = () => {
      const h = window.location.hash.replace("#","") || "/";
      setPage(h);
    };
    handleHash();
    window.addEventListener("hashchange", handleHash);
    return () => window.removeEventListener("hashchange", handleHash);
  }, []);

  return (
    <div>
      <Nav page={page} setPage={navigateTo}/>
      {page==="/" && <Landing setPage={navigateTo}/>}
      {page==="/admin" && <AdminDashboard/>}
      {page==="/business" && <BusinessPortal/>}
      {page==="/widget" && <ChatWidgetPage/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
